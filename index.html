<!DOCTYPE html>
<html>
<head>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    position: fixed;
    top: 0; left: 0;
  }
  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 99999;
    background: transparent;
    user-select: none;
  }
</style>
</head>
<body>
<div class="overlay"
     oncontextmenu="return false"
     onselectstart="return false"
     ondragstart="return false">
</div>
</body>
</html>
