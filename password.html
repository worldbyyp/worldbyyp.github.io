<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>성인 인증 — YOUNGPIL Webzine : 世界2</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box;
      cursor: url('https://res.cloudinary.com/dcaiskf8f/image/upload/v1779699457/mouse1_tqbkrp.png'), default;
    }
    html, body {
      width: 100%; height: 100%;
      background: #0b0b14;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nanum Gothic', sans-serif;
    }
    .wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 24px;
    }
    .label {
      color: #aaaaaa; font-size: 13px; letter-spacing: 2px;
    }
    .hint-btn {
      background: transparent;
      border: 1px solid #444; color: #666666;
      font-size: 11px; padding: 6px 18px;
      cursor: url('https://res.cloudinary.com/dcaiskf8f/image/upload/v1779699457/mouse2_nubpj6.png'), pointer;
      font-family: 'Nanum Gothic', sans-serif;
      letter-spacing: 1px;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
      display: inline-block;
    }
    .hint-btn:hover { border-color: #888888; color: #aaaaaa; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    input {
      background: transparent; border: none;
      border-bottom: 1px solid #555555;
      color: #ffffff; font-size: 20px; letter-spacing: 6px;
      width: 140px; padding: 8px 4px; text-align: center;
      font-family: 'Nanum Gothic', sans-serif; outline: none;
    }
    input:focus { border-bottom-color: #ffffff; }
    .confirm-btn {
      background: transparent;
      border: 1px solid #555555; color: #aaaaaa;
      font-size: 13px; padding: 8px 24px;
      cursor: url('https://res.cloudinary.com/dcaiskf8f/image/upload/v1779699457/mouse2_nubpj6.png'), pointer;
      font-family: 'Nanum Gothic', sans-serif; letter-spacing: 1px;
      transition: border-color 0.2s, color 0.2s;
    }
    .confirm-btn:hover { border-color: #ffffff; color: #ffffff; }
    .error { color: #cc4444; font-size: 12px; letter-spacing: 1px; height: 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="label">비밀번호를 입력하세요</div>
    <a class="hint-btn" href="https://posty.pe/7kuplk" target="_blank">비밀번호 확인하기</a>
    <div class="input-row">
      <input type="password" id="pw" maxlength="6" placeholder="······" />
      <button class="confirm-btn" onclick="check()">입력</button>
    </div>
    <div class="error" id="err"></div>
  </div>
  <script>
    // 이동할 페이지는 URL 파라미터로 받음
    function getTarget() {
      var params = new URLSearchParams(window.location.search);
      return params.get('to') || '/fic';
    }
    function check() {
      var val = document.getElementById('pw').value.trim();
      if (val === '616479') {
        // sessionStorage에 인증 저장
        window.location.href = getTarget();
      } else {
        document.getElementById('err').textContent = '비밀번호가 올바르지 않습니다.';
        document.getElementById('pw').value = '';
      }
    }
    document.getElementById('pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') check();
    });
  </script>
</body>
</html>
