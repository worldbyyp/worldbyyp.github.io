<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영필 웹진 : 세계世界2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box;
    cursor: url('https://art.theworldbyyp.kr/main/mouse-basic.png'), default; }
  body { background: #0b0b14; background-image: url('https://art.theworldbyyp.kr/main/background.png'); background-size: cover; background-position: center; background-attachment: scroll; background-repeat: no-repeat; font-family: 'Nanum Gothic', sans-serif;
    overflow: hidden; }

  /* ── 영상 화면 ── */
  #video-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #0b0b14; z-index: 100;
    transition: opacity 0.6s;
  }
  #video-screen.hidden { opacity: 0; pointer-events: none; }

  #main-video {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* SKIP 버튼 */
  #skip-btn {
    position: absolute; bottom: 32px; right: 36px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.8);
    font-size: 13px; letter-spacing: 2px;
    padding: 14px 36px;
    cursor: url('https://art.theworldbyyp.kr/main/mouse-hover.png'), pointer;
    transition: background 0.2s, color 0.2s;
    z-index: 101;
  }
  #skip-btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }

  /* ── 메인 화면 ── */
  #main-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    background: transparent;
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s;
    overflow: hidden;
  }
  #main-screen.visible {
    opacity: 1; pointer-events: auto;
  }

  /* title 이미지 */
  @keyframes float {
    0%   { transform: translateY(0px); }
    50%  { transform: translateY(-28px); }
    100% { transform: translateY(0px); }
  }

  #img-title {
    display: block;
    width: min(420px, 50vw);
    height: auto;
    pointer-events: none;
    animation: float 4s ease-in-out infinite;
  }

  /* 비디오기계 이미지 래퍼 */
  #machine-wrap {
    position: relative;
    width: min(800px, 95vw);
  }
  #machine-wrap img {
    display: block; width: 100%; height: auto;
    pointer-events: none;
  }
  #machine-wrap img.hover-img {
    position: absolute; top:0; left:0;
    opacity: 0; transition: opacity 0.0s;
  }

  /* 클릭 영역 */
  .zone {
    position: absolute; z-index: 10; text-decoration: none;
    cursor: url('https://art.theworldbyyp.kr/main/mouse-hover.png'), pointer;
  }
  /* home, fic, art, behind 영역 — art/index.html과 동일한 비율 사용 */
  .zone-home   { left:0%;   top:0%;  width:13%; height:100%; }
  .zone-fic    { left:76%;  top:0%;  width:7%;  height:70%; }
  .zone-art    { left:84%;  top:0%;  width:7%; height:70%; }
  .zone-behind { left:88%;  top:55%; width:7%; height:17%; }
  /* REW / FFW — 하단 버튼 5번(REW), 6번(FFW) 위치 */
  .zone-rew    { left:52%;  top:68%; width:7%; height:24%; }
  .zone-ffw    { left:60%;  top:68%; width:7%; height:24%; }
  /* GAME — REW보다 왼쪽 */
  .zone-game   { left:30%;  top:68%; width:8.5%; height:24%; }

  /* 모바일: 이미지 가로 꽉 채우기 */
  @media (max-width: 768px) {
    #img-title {
      width: 50vw;
    }
    #machine-wrap {
      width: 100vw;
    }
  }

  /* FFW 팝업 */
  #ffw-popup {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(11,11,20,0.88);
    border: 1px solid rgba(255,255,255,0.2);
    color: #ffffff;
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 44px 52px 36px;
    white-space: nowrap;
    backdrop-filter: blur(6px);
    opacity: 0;
    transition: opacity 0.4s;
  }
  #ffw-popup.show { display: flex; }
  #ffw-popup.visible { opacity: 1; }

  /* 글리치 */
  #ffw-popup.glitch {
    animation: glitch-box 0.4s steps(1) forwards;
  }
  @keyframes glitch-box {
    0%   { transform: translate(-50%, -50%); clip-path: inset(0 0 0 0); }
    10%  { transform: translate(-52%, -49%); clip-path: inset(10% 0 60% 0); filter: hue-rotate(90deg); }
    20%  { transform: translate(-48%, -51%); clip-path: inset(40% 0 20% 0); filter: hue-rotate(-90deg); }
    30%  { transform: translate(-50%, -50%); clip-path: inset(0 0 0 0); filter: none; }
    40%  { transform: translate(-51%, -50%); clip-path: inset(70% 0 5% 0); filter: hue-rotate(45deg); }
    50%  { transform: translate(-50%, -50%); clip-path: inset(0 0 0 0); filter: none; }
    100% { transform: translate(-50%, -50%); clip-path: inset(0 0 0 0); filter: none; }
  }

  /* 상단 X 버튼 */
  #ffw-close {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    cursor: url('https://art.theworldbyyp.kr/main/mouse-hover.png'), pointer;
    background: none;
    border: none;
    color: rgba(255,255,255,0.35);
    font-size: 14px;
    line-height: 1;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  #ffw-close:hover { color: #fff; }

  /* ▶▶ 재생 표시 */
  .ffw-playing {
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.5);
    font-weight: 200;
    margin-top: 6px;
  }

  /* 타임코드 */
  .ffw-timecode {
    font-family: 'NeoDunggeunmo Pro', monospace;
    font-size: 20px;
    letter-spacing: 3px;
    font-weight: 200;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ffw-season { color: #ffffff; }
  .ffw-divider { color: #ffffff; }
  .ffw-digits {
    font-family: 'NeoDunggeunmo Pro', monospace;
    font-size: 20px;
    letter-spacing: 2px;
    display: inline-flex;
    align-items: center;
  }
  .ffw-digit {
    display: inline-block;
    width: 1ch;
    text-align: center;
  }
  .ffw-sep {
    color: #ffffff;
    margin: 0 3px;
  }
  #ffw-digits-wrap.blink {
    animation: ffw-blink-all 0.8s steps(1) infinite;
  }
  @keyframes ffw-blink-all {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.25; }
  }
</style>
  <!-- Mona12 + Neo둥근모 Pro -->
  <style>@import url('https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css');</style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-pro-webfont@1.020/neodgm_pro/style.css">

<!-- OG 태그 -->
<meta http-equiv="Cache-Control" content="no-store">
<meta property="og:title" content="영필 웹진 : 세계世界2">
<meta property="og:description" content="영필 웹진 : 세계世界2">
<meta property="og:image" content="https://art.theworldbyyp.kr/main/og.png">
<meta property="og:url" content="https://theworldbyyp.kr/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://art.theworldbyyp.kr/main/og.png">
<link rel="icon" href="/favicon.ico">
</head>
<body oncontextmenu="return false">

<!-- 영상 화면 -->
<div id="video-screen">
  <video id="main-video" autoplay muted playsinline>
    <source src="https://art.theworldbyyp.kr/main/main.mp4" type="video/mp4">
  </video>
  <button id="skip-btn" onclick="showMain()">SKIP</button>
</div>

<!-- 메인 화면 -->
<div id="main-screen">
  <!-- 타이틀 이미지 -->
  <img id="img-title" src="https://art.theworldbyyp.kr/main/main-title.png" alt="">

  <!-- 비디오기계 -->
  <div id="machine-wrap">
    <img class="base" src="https://art.theworldbyyp.kr/main/main-basic.png" alt="">
    <img class="hover-img" id="imgHome"   src="https://art.theworldbyyp.kr/main/main-home.png"   alt="">
    <img class="hover-img" id="imgFic"    src="https://art.theworldbyyp.kr/main/main-fic.png"    alt="">
    <img class="hover-img" id="imgArt"    src="https://art.theworldbyyp.kr/main/main-art.png"    alt="">
    <img class="hover-img" id="imgBehind" src="https://art.theworldbyyp.kr/main/main-behind.png" alt="">
    <img class="hover-img" id="imgRew"    src="https://art.theworldbyyp.kr/main/main-REW.png"    alt="">
    <img class="hover-img" id="imgFfw"    src="https://art.theworldbyyp.kr/main/main-FFW.png"    alt="">
    <img class="hover-img" id="imgGame"   src="https://art.theworldbyyp.kr/main/main-game.png"   alt="">

    <!-- 클릭 영역 -->
    <a class="zone zone-home"   href="/home"   onmouseenter="showHover('imgHome')"   onmouseleave="hideAll()"></a>
    <a class="zone zone-fic"    href="/fic"    onmouseenter="showHover('imgFic')"    onmouseleave="hideAll()"></a>
    <a class="zone zone-art"    href="/art"    onmouseenter="showHover('imgArt')"    onmouseleave="hideAll()"></a>
    <a class="zone zone-behind" href="/behind" onmouseenter="showHover('imgBehind')" onmouseleave="hideAll()"></a>
    <a class="zone zone-rew"    href="https://theworldofyp.web.app/" target="_blank"
       onmouseenter="showHover('imgRew')" onmouseleave="hideAll()"></a>
    <a class="zone zone-ffw"    href="#"
       onmouseenter="showHover('imgFfw')" onmouseleave="hideAll()"
       onclick="showFfw(); return false;"></a>
    <a class="zone zone-game"   href="/game"
       onmouseenter="showHover('imgGame')" onmouseleave="hideAll()"></a>
  </div>
</div>

<!-- FFW 팝업 -->
<div id="ffw-popup">
  <button id="ffw-close" onclick="hideFfw()">✕</button>
  <div class="ffw-playing">▶▶</div>
  <div class="ffw-timecode">
    <span class="ffw-season" id="ffw-season-text">세계<span style="font-family:'Mona12',monospace; font-size:15px; vertical-align:middle;">世界</span>2</span>
    <span class="ffw-divider">:</span>
    <div class="ffw-digits" id="ffw-digits-wrap">
      <span class="ffw-digit">2</span>
      <span class="ffw-digit">0</span>
      <span class="ffw-digit" id="fd-y2">2</span>
      <span class="ffw-digit" id="fd-y3">6</span>
      <span class="ffw-sep">:</span>
      <span class="ffw-digit" id="fd-m0">0</span>
      <span class="ffw-digit" id="fd-m1">6</span>
      <span class="ffw-sep">:</span>
      <span class="ffw-digit" id="fd-d0">0</span>
      <span class="ffw-digit" id="fd-d1">6</span>
    </div>
  </div>
</div>

<script>
  // 영상 끝나면 메인 화면으로
  document.getElementById('main-video').addEventListener('ended', showMain);

  function showMain() {
    var vs = document.getElementById('video-screen');
    var ms = document.getElementById('main-screen');
    vs.classList.add('hidden');
    document.body.style.overflow = '';
    setTimeout(function() {
      ms.classList.add('visible');
    }, 300);
  }

  // 호버 이미지
  var cur = null;
  function showHover(id) {
    if (cur === id) return;
    cur = id;
    document.querySelectorAll('.hover-img').forEach(function(el) { el.style.opacity = '0'; });
    var el = document.getElementById(id);
    if (el) el.style.opacity = '1';
  }
  function hideAll() {
    cur = null;
    document.querySelectorAll('.hover-img').forEach(function(el) { el.style.opacity = '0'; });
  }

  // FFW 팝업
  function showFfw() {
    var p = document.getElementById('ffw-popup');
    p.classList.remove('glitch');
    p.classList.add('show');
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        p.classList.add('visible');
        // 글리치 등장
        setTimeout(function() {
          p.classList.add('glitch');
          setTimeout(function() { p.classList.remove('glitch'); }, 450);
        }, 100);
        startFfwAnimation();
      });
    });
  }
  function hideFfw() {
    var p = document.getElementById('ffw-popup');
    p.classList.remove('visible');
    setTimeout(function() { p.classList.remove('show'); }, 400);
    clearFfwTimers();
  }

  var ffwTimers = [];
  function clearFfwTimers() {
    ffwTimers.forEach(function(t) { clearInterval(t); clearTimeout(t); });
    ffwTimers = [];
  }

  function startFfwAnimation() {
    clearFfwTimers();
    var allIds = ['fd-y2','fd-y3','fd-m0','fd-m1','fd-d0','fd-d1'];
    var startVals = ['2','6','0','6','0','6'];
    var endVals   = ['2','8','?','?','?','?'];

    // 초기화
    allIds.forEach(function(id, i) {
      var el = document.getElementById(id);
      el.textContent = startVals[i];
      el.style.color = '#ffffff';
    });
    document.getElementById('ffw-season-text').innerHTML = '세계<span style="font-family:\'Mona12\',monospace;font-size:15px;vertical-align:middle;">世界</span>2';
    document.getElementById('ffw-digits-wrap').classList.remove('blink');

    // 0.8초 후 전체 동시 롤링 시작
    ffwTimers.push(setTimeout(function() {
      var interval = 50;
      var duration = 900;
      var elapsed = 0;
      var nums = '0123456789'.split('');

      var t = setInterval(function() {
        elapsed += interval;
        // 전체 자리 동시에 랜덤 숫자
        allIds.forEach(function(id) {
          document.getElementById(id).textContent = nums[Math.floor(Math.random() * 10)];
        });

        if (elapsed >= duration) {
          clearInterval(t);
          // 최종값 고정
          allIds.forEach(function(id, i) {
            document.getElementById(id).textContent = endVals[i];
            document.getElementById(id).style.color = '#ffffff';
          });
          document.getElementById('ffw-season-text').innerHTML = '세계<span style="font-family:\'Mona12\',monospace;font-size:15px;vertical-align:middle;">世界</span>3';

          // 글리치 한번 더
          var p = document.getElementById('ffw-popup');
          p.classList.add('glitch');
          ffwTimers.push(setTimeout(function() {
            p.classList.remove('glitch');
            // 전체 깜빡임 시작
            document.getElementById('ffw-digits-wrap').classList.add('blink');
          }, 450));
        }
      }, interval);
      ffwTimers.push(t);
    }, 800));
  }
</script>
</body>
</html>
