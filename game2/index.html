<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦊 HUNTER — YOUNGPIL</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0b0b14; font-family:'Courier New',monospace; color:#fff; display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:20px; }
h2 { font-size:14px; letter-spacing:4px; color:#888; margin-bottom:4px; }
.sub { font-size:11px; color:#444; letter-spacing:2px; margin-bottom:12px; }
.info-bar { display:flex; gap:40px; margin-bottom:10px; font-size:12px; letter-spacing:2px; color:#666; }
.info-bar span { color:#fff; }
canvas { border:1px solid #222; display:block; touch-action:none; }
.msg { margin-top:14px; font-size:13px; letter-spacing:3px; color:#888; height:20px; text-align:center; }
.btn { margin-top:12px; padding:8px 32px; border:1px solid #444; background:transparent; color:#888; cursor:pointer; font-size:12px; letter-spacing:2px; font-family:'Courier New',monospace; }
.btn:hover { border-color:#fff; color:#fff; }
.ctrl { margin-top:10px; font-size:11px; color:#333; letter-spacing:1px; text-align:center; }
</style>
</head>
<body>
<h2>🦊 HUNTER</h2>
<div class="sub">🐰 를 모두 잡아라</div>
<div class="info-bar">
  SCORE <span id="score">0</span> &nbsp;&nbsp;
  WAVE <span id="wave">1</span> &nbsp;&nbsp;
  LIFE <span id="lives">🦊🦊🦊</span>
</div>
<canvas id="c"></canvas>
<div class="msg" id="msg"></div>
<button class="btn" id="startBtn" onclick="startGame()">START</button>
<div class="ctrl">PC: ←→ 이동 | SPACE 발사 &nbsp;|&nbsp; 모바일: 탭 이동 | 탭 발사</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
C.width = 360; C.height = 480;

const W = C.width, H = C.height;
let player, bullets, enemies, eBullets, score, wave, lives, gameLoop, state, keys, tick, shootCool;

function startGame() {
  document.getElementById('startBtn').style.display = 'none';
  score = 0; wave = 1; lives = 3; state = 'playing';
  keys = {}; tick = 0; shootCool = 0;
  player = {x: W/2, y: H-50, w:30, h:20};
  bullets = []; eBullets = [];
  spawnWave();
  clearInterval(gameLoop);
  gameLoop = setInterval(step, 33);
}

function spawnWave() {
  enemies = [];
  const cols = Math.min(6 + wave, 10);
  const rows = Math.min(3 + Math.floor(wave/2), 6);
  const spacing = (W - 40) / cols;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    enemies.push({
      x: 20 + c*spacing + spacing/2,
      y: 40 + r*44,
      w:24, h:20, alive:true,
      dx: (wave%2===0?-1:1) * (0.3 + wave*0.08)
    });
  }
  document.getElementById('wave').textContent = wave;
  document.getElementById('msg').textContent = `WAVE ${wave}`;
  setTimeout(()=>{ if(state==='playing') document.getElementById('msg').textContent=''; }, 1000);
}

function step() {
  if(state !== 'playing') return;
  tick++;

  // 플레이어 이동
  if(keys['ArrowLeft'] && player.x > 20) player.x -= 5;
  if(keys['ArrowRight'] && player.x < W-20) player.x += 5;

  // 발사
  if(shootCool > 0) shootCool--;
  if((keys[' '] || keys['shoot']) && shootCool === 0) {
    bullets.push({x:player.x, y:player.y-14, type:'player'});
    shootCool = Math.max(8 - wave, 3);
    keys['shoot'] = false;
  }

  // 플레이어 총알 이동
  bullets = bullets.filter(b => b.y > -10);
  bullets.forEach(b => b.y -= 10);

  // 적 이동 + 방향 전환
  let hitWall = false;
  enemies.filter(e=>e.alive).forEach(e => {
    e.x += e.dx;
    if(e.x < 16 || e.x > W-16) hitWall = true;
  });
  if(hitWall) {
    enemies.forEach(e => {
      e.dx *= -1;
      e.y += 10;
    });
  }

  // 적 총알
  if(tick % Math.max(40 - wave*4, 12) === 0) {
    const alive = enemies.filter(e=>e.alive);
    if(alive.length) {
      // 맨 아래 적들만 발사
      const frontMap = {};
      alive.forEach(e => {
        const col = Math.round(e.x / 40);
        if(!frontMap[col] || e.y > frontMap[col].y) frontMap[col] = e;
      });
      Object.values(frontMap).forEach(e => {
        if(Math.random() < 0.6)
          eBullets.push({x:e.x, y:e.y+12});
      });
    }
  }

  eBullets = eBullets.filter(b => b.y < H+10);
  eBullets.forEach(b => b.y += 6 + wave*0.3);

  // 플레이어 총알 vs 적
  bullets.forEach(b => {
    enemies.filter(e=>e.alive).forEach(e => {
      if(Math.abs(b.x-e.x)<14 && Math.abs(b.y-e.y)<14) {
        e.alive = false; b.y = -999;
        score += 100 + wave*10;
        document.getElementById('score').textContent = score;
      }
    });
  });

  // 적 총알 vs 플레이어
  eBullets.forEach(b => {
    if(Math.abs(b.x-player.x)<16 && Math.abs(b.y-player.y)<16) {
      b.y = H+999;
      lives--;
      document.getElementById('lives').textContent = '🦊'.repeat(Math.max(0,lives));
      if(lives <= 0) { state='dead'; clearInterval(gameLoop); draw(); return; }
      player.x = W/2;
    }
  });

  // 적이 플레이어 라인 도달
  enemies.filter(e=>e.alive).forEach(e=>{
    if(e.y > H - 60) { state='dead'; clearInterval(gameLoop); }
  });

  // 웨이브 클리어
  if(enemies.every(e=>!e.alive)) {
    wave++;
    score += wave * 500;
    document.getElementById('score').textContent = score;
    bullets = []; eBullets = [];
    spawnWave();
  }

  draw();
}

function draw() {
  ctx.clearRect(0,0,W,H);

  // 별 배경
  ctx.fillStyle = '#111';
  for(let i=0;i<3;i++) {
    ctx.fillStyle = `rgba(255,255,255,${0.1+i*0.05})`;
    ctx.fillRect((tick*0.2+i*120)%W, (tick*0.3+i*80)%H, 1, 1);
  }

  // 플레이어
  ctx.font = '26px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🦊', player.x, player.y);

  // 적
  enemies.filter(e=>e.alive).forEach(e => ctx.fillText('🐰', e.x, e.y));

  // 플레이어 총알 (♥)
  ctx.fillStyle = '#ff6688';
  ctx.font = 'bold 11px serif';
  bullets.forEach(b => {
    ctx.fillText('♥', b.x, b.y);
  });

  // 적 총알
  ctx.fillStyle = '#88aaff';
  eBullets.forEach(b => {
    ctx.fillRect(b.x-2, b.y-5, 4, 10);
  });

  // 게임오버
  if(state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff'; ctx.font = '20px Courier New'; ctx.textAlign='center';
    ctx.fillText('GAME OVER', W/2, H/2-20);
    ctx.font = '13px Courier New'; ctx.fillStyle = '#888';
    ctx.fillText(`FINAL SCORE: ${score}`, W/2, H/2+10);
    ctx.fillText(`WAVE ${wave} 도달`, W/2, H/2+32);
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('startBtn').textContent = 'RETRY';
  }
}

// 키보드
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if(e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.key] = false);

// 모바일 터치
let lastTouchX = null;
C.addEventListener('touchstart', e => {
  e.preventDefault();
  lastTouchX = e.touches[0].clientX;
  keys['shoot'] = true;
}, {passive:false});
C.addEventListener('touchmove', e => {
  e.preventDefault();
  if(lastTouchX !== null && player) {
    const dx = e.touches[0].clientX - lastTouchX;
    player.x = Math.max(20, Math.min(W-20, player.x + dx*2));
    lastTouchX = e.touches[0].clientX;
  }
}, {passive:false});
C.addEventListener('touchend', e => { lastTouchX = null; }, {passive:true});

ctx.fillStyle = '#222'; ctx.fillRect(0,0,W,H);
ctx.fillStyle='#444'; ctx.font='14px Courier New'; ctx.textAlign='center';
ctx.fillText('START를 눌러 시작', W/2, H/2);
</script>
</body>
</html>
