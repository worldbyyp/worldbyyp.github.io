<style>
  :root {
    --border-color: rgba(128,128,128,0.35);
    --bg: #ffffff;
    --text: #222222;
    --header-bg: #0b0b14;
    --btn-wrap-bg: #0b0b14;
    --footer-bg: #0b0b14;
  }
  .dark-mode {
    --bg: #111111;
    --text: #ffffff;
    --header-bg: #111120;
    --btn-wrap-bg: #111120;
    --footer-bg: #111120;
  }
  * { margin: 0; padding: 0; box-sizing: border-box;
    -webkit-user-select: none !important;
    -moz-user-select: none !important;
    -ms-user-select: none !important;
    user-select: none !important; }
  html, body {
    background: var(--bg);
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 16px; line-height: 2; color: var(--text);
    cursor: default; transition: background 0.3s, color 0.3s;
  }
  .header, .btn-wrap, .footer, #settings-wrap, #top-btn {
    cursor: url('https://art.theworldbyyp.kr/main/mouse-basic.png'), default !important;
  }
  .content { cursor: default !important; }
  a, button {
    cursor: url('https://art.theworldbyyp.kr/main/mouse-hover.png'), pointer !important;
  }
  #progress-bar {
    position: fixed; top: 0; left: 0; height: 3px; width: 0%;
    background: #888888; z-index: 9999; transition: width 0.1s;
  }
  .header {
    background: var(--header-bg); color: #ffffff;
    text-align: center; padding: 60px 20px 50px; transition: background 0.3s;
  }
  .header-img-wrap {
    margin-top: 0;
    margin-bottom: 60px;
    display: flex;
    justify-content: center;
  }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: 2px; margin-bottom: 16px; }
  .header .author { font-size: 15px; color: #aaaaaa; margin-bottom: 8px; }
  .header .trigger { font-size: 13px; }
  .bgm-wrap {
    background: var(--bg); display: flex; justify-content: center;
    padding: 30px 20px 0; transition: background 0.3s;
  }
  .bgm-btn {
    width: 48px; height: 32px;
    border: 1px solid var(--text);
    background: transparent; color: var(--text);
    font-size: 14px; font-family: 'Nanum Gothic', sans-serif;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.3; transition: opacity 0.2s;
    cursor: url('https://art.theworldbyyp.kr/main/mouse-hover.png'), pointer !important;
  }
  .bgm-btn:hover { opacity: 0.7; }
  .bgm-btn.playing { opacity: 1; }
  #settings-wrap {
    position: fixed; bottom: 36px; left: 28px; z-index: 999;
    display: flex; flex-direction: row; align-items: flex-end; gap: 8px;
  }
  #settings-panel {
    background: rgba(30,30,40,0.82); border: 1px solid var(--border-color);
    backdrop-filter: blur(6px); padding: 12px 14px;
    display: flex; flex-direction: column; gap: 10px;
    opacity: 0; pointer-events: none; transform: translateX(-10px);
    transition: opacity 0.25s, transform 0.25s;
  }
  #settings-panel.open { opacity: 1; pointer-events: auto; transform: translateX(0); }
  .panel-row { display: flex; flex-direction: row; align-items: center; gap: 6px; }
  .panel-row:last-child { justify-content: center; }
  .ctrl-btn {
    border: 1px solid var(--border-color); background: transparent; color: #cccccc;
    font-family: 'Nanum Gothic', sans-serif; padding: 3px 10px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
    cursor: url('https://art.theworldbyyp.kr/main/mouse-hover.png'), pointer !important;
  }
  .ctrl-btn.mode-btn { font-size: 13px; width: 100%; text-align: center; gap: 4px; }
  .ctrl-btn:hover { border-color: rgba(255,255,255,0.5); color: #ffffff; }
  #gear-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border-color); background: rgba(20,20,30,0.55);
    color: rgba(200,200,200,0.7); font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px); transition: background 0.2s, color 0.2s;
    cursor: url('https://art.theworldbyyp.kr/main/mouse-hover.png'), pointer !important;
  }
  #gear-btn:hover { background: rgba(40,40,55,0.8); color: rgba(255,255,255,0.9); }
  .content {
    max-width: 680px; margin: 0 auto; padding: 40px 24px 60px;
    background: var(--bg); transition: background 0.3s;
  }
  .btn-wrap {
    display: flex; gap: 16px; justify-content: center;
    padding: 60px 0; background: var(--btn-wrap-bg); transition: background 0.3s;
  }
  .btn {
    display: flex; align-items: center; gap: 8px; padding: 10px 28px;
    border: 1px solid #555555; background: transparent; color: #cccccc;
    font-size: 14px; letter-spacing: 1px; text-decoration: none;
    font-family: 'Nanum Gothic', sans-serif; transition: border-color 0.2s, color 0.2s;
    cursor: url('https://art.theworldbyyp.kr/main/mouse-hover.png'), pointer !important;
  }
  .btn:hover { border-color: #ffffff; color: #ffffff; }
  .btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }
  .footer {
    background: var(--footer-bg); text-align: center; padding: 20px;
    font-size: 12px; color: #ffffff; font-family: 'Nanum Gothic', sans-serif;
    transition: background 0.3s;
  }
  #top-btn {
    position: fixed; bottom: 36px; right: 28px;
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--border-color); background: rgba(20,20,30,0.55);
    color: rgba(200,200,200,0.7); font-size: 11px;
    font-family: 'Nanum Gothic', sans-serif;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px); opacity: 0; pointer-events: none;
    transition: opacity 0.3s, background 0.2s, color 0.2s;
    cursor: url('https://art.theworldbyyp.kr/main/mouse-hover.png'), pointer !important;
    z-index: 999;
  }
  #top-btn.visible { opacity: 1; pointer-events: auto; }
  #top-btn:hover { background: rgba(40,40,55,0.8); color: rgba(255,255,255,0.9); }
  @media (max-width: 600px) {
    .header h1 { font-size: 22px; }
    .content { padding: 30px 18px 50px; }
  }
</style>
</head>

<div id="settings-wrap">

  <div id="settings-panel">
    <div class="panel-row">
      <button class="ctrl-btn mode-btn" id="modeBtn" onclick="toggleMode()">🌙 다크모드</button>
    </div>
  </div>
</div>
<button id="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">TOP</button>
<script>

  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; }, true);
  document.addEventListener('selectstart', function(e){ e.preventDefault(); return false; }, true);
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; }, true);
  window.addEventListener('scroll', function() {
    var scrollTop = window.scrollY;
    var docHeight = document.body.scrollHeight - window.innerHeight;
    document.getElementById('progress-bar').style.width = (scrollTop / docHeight * 100) + '%';
    var btn = document.getElementById('top-btn');
    if (scrollTop > 300) btn.classList.add('visible');
    else btn.classList.remove('visible');
  });
  function toggleSettings() {
    document.getElementById('settings-panel').classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    var wrap = document.getElementById('settings-wrap');
    if (!wrap.contains(e.target)) {
      document.getElementById('settings-panel').classList.remove('open');
    }
  });
  function toggleMode() {
    document.body.classList.toggle('dark-mode');
    document.getElementById('modeBtn').textContent =
      document.body.classList.contains('dark-mode') ? '☀️ 라이트모드' : '🌙 다크모드';
  }


</script>
