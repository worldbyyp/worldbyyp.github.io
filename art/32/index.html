<script>

  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; }, true);
  document.addEventListener('selectstart', function(e){ e.preventDefault(); return false; }, true);
  document.addEventListener('dragstart', function(e){ e.preventDefault(); return false; }, true);
  window.addEventListener('scroll', function() {
    var scrollTop = window.scrollY;
    var docHeight = document.body.scrollHeight - window.innerHeight;
    document.getElementById('progress-bar').style.width = (scrollTop / docHeight * 100) + '%';
    var btn = document.getElementById('top-btn');
    if (scrollTop > 300) btn.classList.add('visible');
    else btn.classList.remove('visible');
  });
  function toggleSettings() {
    document.getElementById('settings-panel').classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    var wrap = document.getElementById('settings-wrap');
    if (!wrap.contains(e.target)) {
      document.getElementById('settings-panel').classList.remove('open');
    }
  });
  function toggleMode() {
    document.body.classList.toggle('dark-mode');
    document.getElementById('modeBtn').textContent =
      document.body.classList.contains('dark-mode') ? '☀️ 라이트모드' : '🌙 다크모드';
  }

  var players = {};
  var isPlaying = {};
  isPlaying['HwtEBQiuX-c'] = false;
  isPlaying['6ThfS7mQUqM'] = false;
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
  function onYouTubeIframeAPIReady() {
    players['HwtEBQiuX-c'] = new YT.Player('ytplayer_HwtEBQiuX-c', {events: {'onReady': function(e) {}}});
    players['6ThfS7mQUqM'] = new YT.Player('ytplayer_6ThfS7mQUqM', {events: {'onReady': function(e) {}}});
  }
  function toggleBGM(ytId, btnId) {
    var btn = document.getElementById('bgmBtn_' + btnId);
    if (!isPlaying[ytId]) {
      // 다른 BGM 정지
      Object.keys(isPlaying).forEach(function(id) {
        if (id !== ytId && isPlaying[id]) {
          if (players[id] && players[id].stopVideo) players[id].stopVideo();
          var otherBtn = document.querySelector('[id^="bgmBtn_"][onclick*="' + id + '"]');
          if (otherBtn) otherBtn.textContent = '▶';
          isPlaying[id] = false;
        }
      });
      if (players[ytId] && players[ytId].playVideo) players[ytId].playVideo();
      btn.textContent = '■'; btn.classList.add('playing');
      isPlaying[ytId] = true;
    } else {
      if (players[ytId] && players[ytId].stopVideo) players[ytId].stopVideo();
      btn.textContent = '▶'; btn.classList.remove('playing');
      isPlaying[ytId] = false;
    }
  }
</script>
